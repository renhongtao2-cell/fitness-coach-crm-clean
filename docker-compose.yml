version: '3.8'

services:
  fitness-coach-crm:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=
      - SUPABASE_URL=
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=
      - SUPABASE_SERVICE_ROLE_KEY=
      - ANTHROPIC_API_KEY=
      - ANTHROPIC_BASE_URL=
      - NEXT_PUBLIC_APP_URL=
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
